name: "Quant-Gym"
description: "Financial analysis environment for testing AI agents on market data, news sentiment, and trading strategies"
version: "1.0.0"

environment:
  name: "QuantGym"
  class: "TradingEnvironment"
  module: "server.environment"

tasks:
  - id: "task1"
    name: "Fetch Market Data"
    description: "Agent must retrieve current price for AAPL"
    grader: "task1_grader.grade_task1"
    max_score: 1.0
    
  - id: "task2"
    name: "News Sentiment Analysis"
    description: "Agent must analyze news and recommend Buy/Sell/Hold with explanation"
    grader: "task2_grader.grade_task2"
    max_score: 1.0
    
  - id: "task3"
    name: "Backtest Strategy"
    description: "Agent must backtest a trading strategy and return risk metrics"
    grader: "task3_grader.grade_task3"
    max_score: 1.0

action_schema:
  type: "object"
  properties:
    type:
      type: "string"
      enum: ["GET_PRICE", "GET_NEWS", "BUY", "SELL", "BACKTEST"]
    symbol:
      type: "string"
      default: "AAPL"
    amount:
      type: "integer"
      minimum: 0
    explanation:
      type: "string"
    strategy:
      type: "string"
  required:
    - "type"

observation_schema:
  type: "object"
  properties:
    timestamp:
      type: "string"
    price:
      type: "number"
    balance:
      type: "number"
    holdings:
      type: "integer"
    portfolio_value:
      type: "number"
    last_news:
      type: "object"
    backtest_results:
      type: "object"
